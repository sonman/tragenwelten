<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#F7F3EE">
  <meta name="description" content="Tragenwelt – Babytragen Inventar">
  <title>Tragenwelt</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div id="auth-screen" class="auth-screen">
      <img src="icons/icon-512.png" alt="" class="auth-icon" width="120" height="120">
      <h1>Tragenwelt</h1>
      <p class="auth-text">Melde dich mit Google an, um dein Inventar zu laden.</p>
      <button type="button" id="btn-sign-in" class="btn btn-primary">Mit Google anmelden</button>
      <p id="auth-error" class="error-text hidden"></p>
    </div>

    <div id="loading" class="loading hidden" aria-live="polite">
      <div class="spinner"></div>
      <span>Lädt…</span>
    </div>

    <div id="toast" class="toast hidden" role="status"></div>

    <section id="screen-inventory" class="screen hidden">
      <header class="app-header">
        <h1>Tragenwelt</h1>
        <p class="subtitle">Inventar</p>
      </header>
      <main class="screen-body inventory-body">
        <ul id="inventory-list" class="inventory-list"></ul>
        <p id="inventory-empty" class="empty-state hidden">Noch keine Einträge.</p>
      </main>
      <button type="button" id="btn-add" class="fab" aria-label="Neuen Artikel hinzufügen">+</button>
    </section>

    <section id="screen-details" class="screen hidden">
      <header class="app-header with-back">
        <button type="button" id="btn-back" class="icon-btn" aria-label="Zurück">←</button>
        <div>
          <h1>Details</h1>
          <p id="details-title" class="subtitle"></p>
        </div>
      </header>
      <main class="screen-body">
        <dl id="details-fields" class="details-fields"></dl>
      </main>
      <footer class="details-footer">
        <button type="button" id="btn-hide" class="btn btn-secondary">Ausblenden</button>
        <button type="button" id="btn-next-status" class="btn btn-primary hidden"></button>
      </footer>
    </section>
  </div>

  <div id="modal-add" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-add-title">
    <div class="modal-backdrop" data-close="modal-add"></div>
    <div class="modal-card">
      <header class="modal-header">
        <h2 id="modal-add-title">Neuer Artikel</h2>
        <button type="button" class="icon-btn modal-close" data-close="modal-add" aria-label="Schließen">×</button>
      </header>
      <form id="form-add" class="modal-form">
        <label>
          Name
          <input type="text" name="name" required maxlength="80" autocomplete="off">
        </label>
        <label>
          Kaufpreis (€)
          <input type="number" name="kaufpreis" required min="0" step="0.01" inputmode="decimal">
        </label>
        <label>
          Kaufplattform
          <select name="kaufplatform" required>
            <option value="Kleinanzeigen">Kleinanzeigen</option>
            <option value="Vinted">Vinted</option>
          </select>
        </label>
        <label>
          Kaufdatum
          <input type="date" name="kaufdatum" required>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" data-close="modal-add">Abbrechen</button>
          <button type="submit" class="btn btn-primary">Speichern</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modal-sell" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-sell-title">
    <div class="modal-backdrop" data-close="modal-sell"></div>
    <div class="modal-card">
      <header class="modal-header">
        <h2 id="modal-sell-title">Verkauft</h2>
        <button type="button" class="icon-btn modal-close" data-close="modal-sell" aria-label="Schließen">×</button>
      </header>
      <form id="form-sell" class="modal-form">
        <label>
          Verkaufdatum
          <input type="date" name="verkaufdatum" required>
        </label>
        <label>
          Verkaufpreis (€)
          <input type="number" name="verkaufpreis" required min="0" step="0.01" inputmode="decimal">
        </label>
        <label>
          Verkaufsplattform
          <select name="verkaufplatform" required>
            <option value="Kleinanzeigen">Kleinanzeigen</option>
            <option value="Vinted">Vinted</option>
          </select>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" data-close="modal-sell">Abbrechen</button>
          <button type="submit" class="btn btn-primary">Speichern</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
